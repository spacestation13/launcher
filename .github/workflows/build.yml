name: "GitHub Deploy"

on:
  push:
    tags:
      - "v*"

env:
  WEBVIEW2_FIXED_VERSION: "148.0.3967.96"

jobs:
  build-cm:
    name: Build CM-SS13 Launcher
    permissions:
      contents: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.platform }}-cm

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2 \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            musl-tools

      - name: Cache Wine build
        if: matrix.platform == 'ubuntu-24.04'
        id: cache-wine
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/wine.tar.zst
            src-tauri/winetricks
            src-tauri/cabextract
          key: wine-10.5-musl-${{ hashFiles('scripts/download-wine.sh') }}

      - name: Download Wine (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04' && steps.cache-wine.outputs.cache-hit != 'true'
        run: ./scripts/download-wine.sh

      - name: Prepare sidecar files for AppImage (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          mkdir -p "/tmp/lib/SS13 Launcher"
          cp src-tauri/wine.tar.zst "/tmp/lib/SS13 Launcher/"
          cp src-tauri/winetricks "/tmp/lib/SS13 Launcher/"
          cp src-tauri/cabextract "/tmp/lib/SS13 Launcher/"
          chmod +x "/tmp/lib/SS13 Launcher/winetricks" "/tmp/lib/SS13 Launcher/cabextract"
          mkdir -p src-tauri/webview2-runtime

      - name: Cache WebView2 Fixed Runtime
        if: matrix.platform == 'windows-latest'
        id: cache-webview2
        uses: actions/cache@v4
        with:
          path: src-tauri/webview2-runtime
          key: webview2-fixed-${{ env.WEBVIEW2_FIXED_VERSION }}

      - name: Download WebView2 Fixed Runtime
        if: matrix.platform == 'windows-latest' && steps.cache-webview2.outputs.cache-hit != 'true'
        shell: pwsh
        run: ./scripts/download-webview2.ps1

      - name: install frontend dependencies
        run: npm install

      - name: Cache custom tauri-cli
        if: matrix.platform == 'ubuntu-24.04'
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-feat-truly-portable-appimage-${{ runner.os }}

      - name: Install custom tauri-cli (Linux)
        if: matrix.platform == 'ubuntu-24.04' && steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --force

      - uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: "true"
          ADD_DIR: "/tmp/lib/SS13 Launcher"
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          args: --features cm_ss13 --config src-tauri/tauri.cm.conf.json ${{ matrix.args }} ${{ matrix.platform == 'ubuntu-24.04' && '--config src-tauri/tauri.linux.conf.json' || '' }}
          tauriScript: ${{ matrix.platform == 'ubuntu-24.04' && 'cargo tauri' || 'npm tauri' }}

      - name: Scan with Windows Defender
        if: matrix.platform == 'windows-latest'
        uses: ./.github/actions/defender-scan
        with:
          exe_path: src-tauri/target/release/SS13_Launcher.exe
          build_name: ${{ github.ref_name }}-cm
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build-ss13:
    name: Build SS13 Launcher
    permissions:
      contents: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.platform }}-ss13

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2 \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            musl-tools

      - name: Cache Wine build
        if: matrix.platform == 'ubuntu-24.04'
        id: cache-wine
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/wine.tar.zst
            src-tauri/winetricks
            src-tauri/cabextract
          key: wine-10.5-musl-${{ hashFiles('scripts/download-wine.sh') }}

      - name: Download Wine (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04' && steps.cache-wine.outputs.cache-hit != 'true'
        run: ./scripts/download-wine.sh

      - name: Prepare sidecar files for AppImage (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          mkdir -p "/tmp/lib/SS13 Launcher"
          cp src-tauri/wine.tar.zst "/tmp/lib/SS13 Launcher/"
          cp src-tauri/winetricks "/tmp/lib/SS13 Launcher/"
          cp src-tauri/cabextract "/tmp/lib/SS13 Launcher/"
          chmod +x "/tmp/lib/SS13 Launcher/winetricks" "/tmp/lib/SS13 Launcher/cabextract"
          mkdir -p src-tauri/webview2-runtime

      - name: Cache WebView2 Fixed Runtime
        if: matrix.platform == 'windows-latest'
        id: cache-webview2
        uses: actions/cache@v4
        with:
          path: src-tauri/webview2-runtime
          key: webview2-fixed-${{ env.WEBVIEW2_FIXED_VERSION }}

      - name: Download WebView2 Fixed Runtime
        if: matrix.platform == 'windows-latest' && steps.cache-webview2.outputs.cache-hit != 'true'
        shell: pwsh
        run: ./scripts/download-webview2.ps1

      - name: install frontend dependencies
        run: npm install

      - name: Cache custom tauri-cli
        if: matrix.platform == 'ubuntu-24.04'
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-feat-truly-portable-appimage-${{ runner.os }}

      - name: Install custom tauri-cli (Linux)
        if: matrix.platform == 'ubuntu-24.04' && steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --force

      - uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: "true"
          ADD_DIR: "/tmp/lib/SS13 Launcher"
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          args: ${{ matrix.args }} ${{ matrix.platform == 'ubuntu-24.04' && '--config src-tauri/tauri.linux.conf.json' || '' }}
          updaterJsonPreferNsis: true
          tauriScript: ${{ matrix.platform == 'ubuntu-24.04' && 'cargo tauri' || 'npm tauri' }}


      - name: Scan with Windows Defender
        if: matrix.platform == 'windows-latest'
        uses: ./.github/actions/defender-scan
        with:
          exe_path: src-tauri/target/release/SS13_Launcher.exe
          build_name: ${{ github.ref_name }}-ss13
          github_token: ${{ secrets.GITHUB_TOKEN }}
